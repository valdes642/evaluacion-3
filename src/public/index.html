<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk - GhostDev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>HelpDesk System</h1>
    </header>

    <div id="login-view">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Usuario" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <p id="login-error" style="color: red; display: none;"></p>
    </div>

    <div id="app-view" style="display: none;">
        
        <div id="vista-registrar-ticket">
            <h2>Registrar Nuevo Ticket</h2>
            <form id="ticketForm">
                <input type="text" id="titulo" placeholder="Título del Ticket" required>
                <textarea id="descripcion" placeholder="Descripción del problema" required></textarea>
                <select id="prioridad">
                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baja">Baja</option>
                </select>
                <button type="submit" class="btn">Crear Ticket</button>
            </form>
            <br>
            <button id="btn-ver-tickets" type="button" class="btn btn-secondary">Ver Tickets Creados</button>
        </div>

        <div id="vista-lista-tickets" style="display: none;">
            <h2>Lista de Tickets</h2>
            <div id="tickets-container">
                </div>
            <br>
            <button id="btn-volver-crear" type="button" class="btn btn-secondary">Volver a Registrar Ticket</button>
        </div>

        <br>
        <button id="btnLogout" class="btn btn-danger">Cerrar Sesión</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
